name: Fishydex
options:
  bundleIdPrefix: com.fishydex
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BFV628Z979

targets:
  Fishydex:
    type: application
    platform: iOS
    sources:
      - Fishydex
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Fishydex needs camera access for the Scanner mode to photograph your catches"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Fishydex uses your location to tag where you caught each fish"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Fishydex needs photo library access to save and attach catch photos"
        PRODUCT_BUNDLE_IDENTIFIER: com.fishydex.app
        PRODUCT_NAME: Fishydex
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Fishydex/Fishydex.entitlements
