name: Fishface
options:
  bundleIdPrefix: com.fishface
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: BFV628Z979

targets:
  Fishface:
    type: application
    platform: iOS
    sources:
      - Fishface
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Fishface needs camera access for the Scanner mode to photograph your catches"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Fishface uses your location to tag where you caught each fish"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Fishface needs photo library access to save and attach catch photos"
        PRODUCT_BUNDLE_IDENTIFIER: com.fishface.app
        PRODUCT_NAME: Fishface
        INFOPLIST_KEY_CFBundleDisplayName: Fishface
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Fishface/Fishface.entitlements
